# ──────────────────────────────────────────────────────────────────────────────
# Feu Vert Annecy Dashboard — docker-compose.yml
#
# Usage:
#   docker-compose up -d          # start in background
#   docker-compose down           # stop and remove container
#   docker-compose logs -f        # follow logs
#   docker-compose restart app    # restart after CSV update
#
# Volume strategy:
#   Each CSV source folder on the HOST is mounted read-only into the container.
#   The container sees fixed internal paths (what the engine modules expect).
#   You only need to update host-side paths in the 'volumes:' section below.
#
# ⚠️  EDIT THE LEFT SIDE OF EACH VOLUME LINE to match your host directory layout.
#     The right side (after the colon) must NOT be changed — it matches the
#     paths hardcoded in engine/utils.py.
# ──────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fv_dashboard
    restart: unless-stopped

    ports:
      # HOST_PORT:CONTAINER_PORT
      # Change 8501 on the left if that port is already used on your Proxmox VM.
      - "8501:8501"

    volumes:
      # ── Weekly data ─────────────────────────────────────────────────────────
      # Source: your Obsidian vault / Windows share
      # These are the folders where you drop the CSV exports each week.

      - ./data/SUC:/app/resources/SUC:ro
      - ./data/familles:/app/resources/familles:ro
      - ./data/Pneus:/app/resources/Pneus:ro
      - ./data/ratios_prioritaires:/app/resources/ratios prioritaires:ro
      - ./data/suivi_vendeur:/app/resources/suivi vendeur:ro
      - ./data/defectuosite:/app/resources/defectuosite:ro

      # ── Monthly & Quarterly aggregates ──────────────────────────────────────
      - ./data/monthly_recap:/app/monthly_recap:ro
      - ./data/trimestres:/app/trimestres:ro

      # ── Streamlit config (allows live theme tweaks without rebuild) ──────────
      - ./.streamlit:/app/.streamlit:ro

    environment:
      - TZ=Europe/Paris
      # Streamlit telemetry opt-out
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    # Resource limits — adjust for your Proxmox VM size
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Optional: Traefik reverse proxy labels (uncomment if you use Traefik) ────
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.fv-dashboard.rule=Host(`fv.votre-domaine.local`)"
#      - "traefik.http.services.fv-dashboard.loadbalancer.server.port=8501"
